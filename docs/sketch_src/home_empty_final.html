<!DOCTYPE html><html><head><meta charset="UTF-8"><link rel="stylesheet" href="base.css"></head><body>
<div class="phone">

    </div>
    <div style="border:1.5px dashed #d8d8e2;border-radius:12px;padding:13px 14px;margin-bottom:8px;display:flex;align-items:center;gap:10px;">

    </div>

      <div style="font-size:13px;color:#b0b0bd;line-height:1.6;">아직 코스가 없어요<br>위 버튼으로 첫 코스를 만들어봐요</div>
    </div>
  </div>

<div style="position:absolute;bottom:0;left:0;right:0;height:84px;background:rgba(255,255,255,0.92);border-top:1px solid #eaeaef;display:flex;padding:10px 0 24px;">

  <div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;font-size:10px;color:#b0b0bd;"><span style="font-size:22px;">⭐</span>즐겨찾기</div>
